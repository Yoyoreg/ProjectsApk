<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeStore Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800;900&family=Inter:wght@400;700&display=swap');

        :root {
            --bg-color: #f8f9fa; --card-bg: #ffffff; --text-main: #1a1a1a;
            --text-muted: #707070; --accent-color: #007aff; --nav-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff;
            --text-muted: #a0a0a0; --nav-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; transition: 0.3s;
        }

        .app-container { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; }

        header { padding: 30px 20px 15px 20px; display: flex; align-items: center; justify-content: space-between; }

        /* العنوان مع الأيقونة في المنتصف */
        .header-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 10px;
            font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 1.5rem;
            letter-spacing: -1px;
        }
        .store-logo { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }

        main { flex: 1; overflow-y: auto; padding: 10px 20px 110px 20px; }

        .search-box {
            background: var(--card-bg); border-radius: 18px; padding: 12px 18px;
            display: flex; align-items: center; gap: 12px; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }
        .search-input { border: none; background: transparent; color: var(--text-main); width: 100%; outline: none; }

        .app-card {
            background: var(--card-bg); border-radius: 28px; padding: 22px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 20px;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.02);
        }
        .app-card:active { transform: scale(1.06); }

        .app-icon {
            width: 105px; height: 105px; border-radius: 24px;
            object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .app-info { flex: 1; }
        .app-name { font-weight: 700; font-size: 1.2rem; margin-bottom: 3px; }
        .app-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 5px; }
        
        /* جملة Marcidia الزرقاء */
        .made-by { font-size: 0.75rem; color: var(--accent-color); font-weight: 600; display: block; }

        .btn-get {
            background: var(--accent-color); color: white; border: none;
            padding: 8px 22px; border-radius: 25px; font-weight: 700; font-size: 0.85rem;
        }
        .btn-get:active { transform: scale(1.2); }

        /* الشريط السفلي المطور */
        footer {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; height: 75px; background: var(--nav-bg);
            display: flex; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            backdrop-filter: blur(15px); overflow: hidden;
        }

        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.3s; color: var(--text-muted);
        }
        .nav-item.active { color: var(--accent-color); background: rgba(0,122,255,0.05); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 2px; }
        .nav-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }

        .theme-toggle { cursor: pointer; font-size: 1.3rem; z-index: 10; }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <header>
        <div class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</div>
        <div class="header-center">
            <img src="i.svg" class="store-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/665/665049.png'">
            <span>HOMESTORE</span>
        </div>
        <div style="width: 30px;"></div>
    </header>

    <main>
        <div class="search-box">
            <input type="text" id="strict-search" class="search-input" placeholder="Search in this category...">
        </div>
        <h5 class="fw-bold mb-4" id="view-title">Applications</h5>
        <div id="apps-list">
            </div>
    </main>

    <footer>
        <div class="nav-item active" id="nav-ap" onclick="setCategory('ap')">
            <div class="nav-icon">📱</div>
            <div class="nav-label">Apps</div>
        </div>
        <div class="nav-item" id="nav-gm" onclick="setCategory('gm')">
            <div class="nav-icon">🎮</div>
            <div class="nav-label">Games</div>
        </div>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpEsKwKRgHczqMwKq58W6q0pWdbixaXzo",
        projectId: "home-app-store",
        databaseURL: "https://home-app-store-default-rtdb.firebaseio.com/", 
        appId: "1:244898861765:web:1a52a6a3e0609893a3d6ac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allApps = {};
    let currentCategory = 'ap';

    onValue(ref(db, 'data/apps'), (snapshot) => {
        allApps = snapshot.val() || {};
        filterAndRender();
    });

    function filterAndRender(searchQuery = "") {
        const container = document.getElementById('apps-list');
        container.innerHTML = "";
        
        const filtered = Object.keys(allApps).filter(key => {
            const item = allApps[key];
            const matchesType = item.type === currentCategory;
            const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
            return matchesType && matchesSearch;
        });

        filtered.forEach(key => {
            const item = allApps[key];
            container.innerHTML += `
                <div class="app-card">
                    <img src="${item.icon}" class="app-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1006/1006151.png'">
                    <div class="app-info">
                        <div class="app-name">${item.name}</div>
                        <div class="app-desc">${item.description}</div>
                        <span class="made-by">made by Marcidia</span>
                    </div>
                    <button class="btn-get" onclick="window.open('${item.download_url}', '_blank')">GET</button>
                </div>
            `;
        });
    }

    window.setCategory = (type) => {
        currentCategory = type;
        document.getElementById('nav-ap').classList.toggle('active', type === 'ap');
        document.getElementById('nav-gm').classList.toggle('active', type === 'gm');
        document.getElementById('view-title').innerText = type === 'ap' ? 'Applications' : 'Games';
        filterAndRender();
    };

    document.getElementById('strict-search').oninput = (e) => filterAndRender(e.target.value);

    window.toggleTheme = () => {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
    };
</script>
</body>
</html>
